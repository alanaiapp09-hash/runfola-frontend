<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Runfola · QuickOrder</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#ffffff">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#fff;color:#111;display:flex;align-items:center;justify-content:center;min-height:100dvh}
.wrap{width:100%;max-width:360px;padding:24px 20px}
.logo{text-align:center;margin-bottom:32px}
.logo img{width:120px;margin-bottom:12px}
.logo-name{font-size:24px;font-weight:800;color:#111}
.logo-sub{font-size:13px;color:#888;margin-top:4px}
.btn{display:flex;align-items:center;gap:14px;width:100%;padding:16px 18px;border-radius:16px;border:none;cursor:pointer;margin-bottom:10px;text-decoration:none;transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn-icon{font-size:24px;flex-shrink:0}
.btn-text{text-align:left}
.btn-label{font-size:16px;font-weight:800;display:block}
.btn-desc{font-size:11px;opacity:.65;margin-top:2px;display:block}
.b-w{background:#FF6B35;color:#fff}
.b-k{background:#fff3ee;color:#cc4400;border:2px solid #FF6B35}
.b-b{background:#e8f8ff;color:#006b99;border:2px solid #00CFFF}
.b-c{background:#fdf5ff;color:#8a009c;border:2px solid #D946EF}
.b-a{background:#f5f5f5;color:#333;border:2px solid #ddd}
.footer{text-align:center;font-size:11px;color:#bbb;margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <img src="https://i.imgur.com/x0BcD26.png" alt="Runfola">
    <div class="logo-name">Runfola</div>
    <div class="logo-sub">coffee · pizzería · bar</div>
  </div>
  <a class="btn b-w" id="l-waiter"><span class="btn-icon">🧑‍🍽️</span><span class="btn-text"><span class="btn-label">Camarer@</span><span class="btn-desc">Tomar pedidos y gestionar mesas</span></span></a>
  <a class="btn b-k" id="l-kitchen"><span class="btn-icon">🍕</span><span class="btn-text"><span class="btn-label">Cocina</span><span class="btn-desc">Pizzas, entrantes, ensaladas y postres</span></span></a>
  <a class="btn b-b" id="l-bar"><span class="btn-icon">☕</span><span class="btn-text"><span class="btn-label">Barra</span><span class="btn-desc">Bebidas y cafetería</span></span></a>
  <a class="btn b-c" id="l-cash"><span class="btn-icon">🧾</span><span class="btn-text"><span class="btn-label">Caja</span><span class="btn-desc">Cuentas y cierre de mesas</span></span></a>
  <a class="btn b-a" href="./admin.html"><span class="btn-icon">⚙️</span><span class="btn-text"><span class="btn-label">Admin</span><span class="btn-desc">Gestionar menú y precios</span></span></a>
  <div class="footer">Runfola · order.runfolapizzas.com</div>
</div>
<script>
const BASE = window.location.origin + '/app.html';
const BACKEND = 'wss://runfola-backend2-production.up.railway.app';
['waiter','kitchen','bar','cash'].forEach(r => {
  const el = document.getElementById('l-'+r);
  if(el) el.href = `${BASE}?role=${r}&backend=${BACKEND}`;
});
</script>
</body>
</html>
